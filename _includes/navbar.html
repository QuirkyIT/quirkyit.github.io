<header>
  <a href="{{ '/' | absolute_url }}" aria-label="QuirkyIT home">
    <img class="site-logo" src="{{ '/img/Logo.png' | relative_url }}" alt="QuirkyIT logo" />
  </a>
  <nav aria-label="Primary navigation">
    {% for item in site.nav %}
      <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
    {% endfor %}
  </nav>
</header>
